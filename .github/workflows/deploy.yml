name: Deploy landing

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        run: |
          install -m 600 /dev/null /tmp/deploy_key
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          ssh -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              -p ${{ secrets.SSH_PORT || 22 }} \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "sudo /usr/local/bin/deploy-landing"
          rm -f /tmp/deploy_key
